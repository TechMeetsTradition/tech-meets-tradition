<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="favicon.png">
    <meta charset="UTF-8">
    <title>Home | TechMeetsTradition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* --- Unified Navigation Layout --- */
        .navbar-with-banner {
            display: flex;
            align-items: center;
            justify-content: space-between; 
            padding: 10px 40px;
            background: #fff;
            border-bottom: 1px solid #eee;
        }

        .logo-container {
            flex: 1;
            display: flex;
            align-items: center;
        }

        .nav-banner-container {
            flex: 2;
            text-align: center;
        }

        .nav-banner {
            width: 50%;
            max-width: 350px; 
            height: auto;
            border-radius: 4px;
        }

        .nav-links-container {
            flex: 1;
            display: flex;
            justify-content: flex-end;
        }

        .nav-links-container ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        .nav-links-container ul li a {
            text-decoration: none;
            color: #333;
            font-weight: 600;
        }

        /* --- Page Content Styling --- */
        .header-image {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 30px;
            display: block;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            margin-top: 60px;
            font-size: 0.85rem;
            color: #777;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <nav class="navbar-with-banner">
        <div class="logo-container">
            <a href="index.html" class="logo">
                <img src="logo.png" alt="TMT Logo" width="80" height="80">
            </a>
        </div>

        <div class="nav-banner-container">
            <img src="home-banner.png" alt="TMT Banner" class="nav-banner">
        </div>
        
        <div class="nav-links-container">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <img src="home-banner.jpg" alt="Ancient Wisdom meets Future Tech" class="header-image">
        <h1 class="hero-title">Welcome to the TMT Website</h1>
        <p><strong>Bridging the gap between the ancient past and the digital future.</strong></p>
    </div>

    <footer>
        <p>Visuals and prompt creation assistance by Nano Banana 2 & Google Gemini 3. <br>
        Curated by TechMeetsTradition.</p>
    </footer>
</body>
</html>
